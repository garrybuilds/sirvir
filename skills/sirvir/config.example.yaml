# Sirvir profile config template
# Copy to config.yaml and edit with your model endpoints
# 
# This config assumes turbofit is running:
#   Main model: http://127.0.0.1:11500/v1 (your primary local model)
#   Aux model:  http://127.0.0.1:8082/v1  (your vision/aux model)

model:
  default: your-main-model
  provider: custom
  base_url: http://127.0.0.1:11500/v1
  api_key: sk-no-key

auxiliary:
  vision:
    provider: custom
    model: your-aux-model
    base_url: http://127.0.0.1:8082/v1
    api_key: sk-no-key
    timeout: 120
  web_extract:
    provider: custom
    model: your-aux-model
    base_url: http://127.0.0.1:8082/v1
    api_key: sk-no-key

# Enable toolsets for the Sirvir profile
platform_toolsets:
  cli:
    - terminal
    - file
    - web
    - vision
    - skills
    - memory
    - session_search
    - delegation
    - cronjob
    - todo
    - clarify

# Set working directory
terminal:
  cwd: /home/your-user
