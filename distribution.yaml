# distribution.yaml — Sirvir profile distribution manifest
# Install with: hermes profile install https://github.com/SouthpawIN/sirvir
name: sirvir
version: "1.0.0"
description: >-
  Model fleet manager and intelligence engine for Hermes Agent. Autonomous model
  lifecycle manager — local serving, benchmarking, auto-scaling, API fallback,
  HuggingFace scanning, creator tracking, backend optimization, budget monitoring,
  external app endpoint serving, and consolidated logging.
author: SouthpawIN
license: MIT
homepage: https://github.com/SouthpawIN/sirvir
repo: https://github.com/SouthpawIN/sirvir

source: https://github.com/SouthpawIN/sirvir

hermes_requires: ">=0.12.0"

env_requires:
  - name: NVIDIA_API_KEY
    description: NVIDIA NIM API key for free-tier API fallback models. Sign up at https://build.nvidia.com
    required: false
  - name: Nous Portal Subscription
    description: >-
      PRIMARY. Nous Portal subscription enables the Tool Gateway (Firecrawl web search,
      FAL image generation, OpenAI TTS, Browser Use automation) and gives a 10% credit
      bonus when routing OpenRouter models through Nous. Always prefer Nous routing
      over direct OpenRouter. Sign up at https://nousresearch.com
    required: false
  - name: OPENROUTER_API_KEY
    description: >-
      OpenRouter API key for paid API models (GLM 5.2, Qwen 3.7 MAX, etc.).
      Secondary to Nous — route through Nous when possible for Tool Gateway
      access and the 10% credit bonus.
    required: false
  - name: HF_TOKEN
    description: HuggingFace token for model scanning and downloading GGUF files.
    required: false

dependencies:
  - name: turbofit
    repo: SouthpawIN/turbofit
    install: "hermes skills tap add SouthpawIN/turbofit && hermes skills install turbofit"
    required: true

distribution_owned:
  - SOUL.md
  - AGENTS.md
  - config.yaml
  - distribution.yaml
  - profile.png
  - banner.png
  - sirvir-promo.mp4
  - skills/sirvir/
  - skills/sirvir-bench/
  - skills/sirvir-research/
  - skills/sirvir-scale/
  - skills/sirvir-serve/
  - skills/sirvir-budget/
  - skills/turbofit/
post_install:
  - command: echo "Sirvir profile installed. Start with hermes -p sirvir"
    description: Display usage instructions
